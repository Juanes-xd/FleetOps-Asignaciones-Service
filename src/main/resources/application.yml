spring:
  application:
    name: fleetops-asignaciones

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ── Configuración de dominio ──────────────────────────────────────────────────
asignaciones:
  kafka:
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:asignaciones-group}
    producer:
      transaction-id-prefix: ${KAFKA_PRODUCER_TRANSACTION_ID_PREFIX:asignaciones-tx}
    topics:
      vehiculos-solicitar:   ${KAFKA_TOPIC_VEHICULOS_SOLICITAR:fleetops.vehiculos.solicitar}
      vehiculos-liberar:     ${KAFKA_TOPIC_VEHICULOS_LIBERAR:fleetops.vehiculos.liberar}
      vehiculos-confirmado:  ${KAFKA_TOPIC_VEHICULOS_CONFIRMADO:fleetops.asignaciones.vehiculo.confirmado}
      vehiculos-fallido:     ${KAFKA_TOPIC_VEHICULOS_FALLIDO:fleetops.asignaciones.vehiculo.fallido}
      incidentes-falla-mecanica: ${KAFKA_TOPIC_INCIDENTES_FALLA:fleetops.incidentes.falla.mecanica}
      asignacion-completada: ${KAFKA_TOPIC_ASIGNACION_COMPLETADA:fleetops.asignaciones.completada}
      asignacion-fallida:    ${KAFKA_TOPIC_ASIGNACION_FALLIDA:fleetops.asignaciones.fallida}
